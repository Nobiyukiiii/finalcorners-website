<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — Final Corners | Indie Rock Bandung</title>
  <meta name="description" content="Berita dan pembaruan terbaru dari Final Corners — band indie rock asal Bandung, Indonesia.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://finalcorners.my.id/news/">
  <meta property="og:title" content="News — Final Corners">
  <meta property="og:description" content="Berita dan pembaruan terbaru dari Final Corners — band indie rock asal Bandung.">
  <meta property="og:url" content="https://finalcorners.my.id/news/">
  <meta property="og:image" content="https://finalcorners.my.id/assets/og-image.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="News — Final Corners">
  <meta name="twitter:description" content="Berita dan pembaruan terbaru dari Final Corners — band indie rock asal Bandung.">
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- JSON-LD: CollectionPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "News — Final Corners",
    "description": "Berita dan pembaruan terbaru dari Final Corners — band indie rock asal Bandung, Indonesia.",
    "url": "https://finalcorners.my.id/news/",
    "publisher": {
      "@type": "MusicGroup",
      "name": "Final Corners",
      "url": "https://finalcorners.my.id/",
      "logo": { "@type": "ImageObject", "url": "https://finalcorners.my.id/assets/logo.png" }
    }
  }
  </script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0e0c0b;--surface:#161311;--surface2:#1c1815;--surface3:#201d1a;
      --border:#2d2723;--border-light:#3d3530;
      --white:#f0ebe4;--text:#c4bcb2;--text-muted:#7a7168;--text-faint:#4a4440;
      --accent:#c94b4b;--accent-2:#e06060;
      --accent-dim:rgba(201,75,75,0.10);--accent-glow:rgba(201,75,75,0.18);
      --font-logo:'Lilita One',Impact,'Arial Black',sans-serif;
      --font-body:'Inter','Helvetica Neue',Arial,sans-serif;
      --header-h:57px;
    }

    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px}
    ::-webkit-scrollbar-thumb:hover{background:var(--accent)}
    ::selection{background:var(--accent-dim);color:var(--white)}
    html{scroll-behavior:smooth}
    body{background-color:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}

    /* ── HEADER ───────────────────────────────────────────────── */
    header{
      position:fixed;top:0;left:0;right:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:0.85rem 2.5rem;
      border-bottom:1px solid var(--border);
      background:rgba(14,12,11,0.96);backdrop-filter:blur(20px);
    }
    .header-logo{display:flex;align-items:center;gap:0.6rem}
    .header-logo img{width:32px;height:32px;object-fit:contain}
    .header-logo-text{font-family:var(--font-logo);font-size:1.15rem;color:var(--white);letter-spacing:0.02em}
    nav{display:flex;gap:2rem;align-items:center}
    nav a{font-size:0.7rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-muted);transition:color 0.2s;font-weight:500}
    nav a:hover,nav a.active{color:var(--accent)}
    .nav-toggle{display:none;flex-direction:column;justify-content:center;gap:5px;width:32px;height:32px;background:none;border:none;cursor:pointer;padding:4px}
    .nav-toggle span{display:block;width:100%;height:1px;background:var(--text-muted);transition:all 0.3s}
    .nav-toggle.open span:nth-child(1){transform:translateY(6px) rotate(45deg);background:var(--accent)}
    .nav-toggle.open span:nth-child(2){opacity:0;transform:scaleX(0)}
    .nav-toggle.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg);background:var(--accent)}
    .nav-drawer{display:none;position:fixed;top:var(--header-h);left:0;right:0;background:rgba(10,8,7,0.98);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);z-index:99;flex-direction:column;transform:translateY(-8px);opacity:0;transition:transform 0.25s ease,opacity 0.25s ease;pointer-events:none}
    .nav-drawer.open{transform:translateY(0);opacity:1;pointer-events:all}
    .nav-drawer a{display:block;padding:1.1rem 2rem;font-size:0.72rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-muted);font-weight:500;border-bottom:1px solid var(--border);transition:color 0.2s,padding-left 0.2s}
    .nav-drawer a:last-child{border-bottom:none}
    .nav-drawer a:hover{color:var(--accent);padding-left:2.5rem}

    /* ── PAGE HERO ────────────────────────────────────────────── */
    .news-hero{
      padding-top:calc(var(--header-h) + 4rem);
      padding-bottom:3rem;
      padding-left:2.5rem;
      padding-right:2.5rem;
      max-width:1200px;
      margin:0 auto;
      border-bottom:1px solid var(--border);
      position:relative;
      overflow:hidden;
    }
    /* subtle decorative number watermark */
    .news-hero::before{
      content:'NEWS';
      position:absolute;
      right:-1rem;top:50%;
      transform:translateY(-50%);
      font-family:var(--font-logo);
      font-size:clamp(6rem,14vw,12rem);
      color:var(--white);
      opacity:0.025;
      letter-spacing:0.05em;
      pointer-events:none;
      user-select:none;
      line-height:1;
    }
    .news-hero-eyebrow{
      display:flex;align-items:center;gap:0.75rem;
      font-size:0.55rem;letter-spacing:0.38em;text-transform:uppercase;
      color:var(--accent);font-weight:600;
      margin-bottom:1.25rem;
    }
    .news-hero-eyebrow::before{
      content:'';width:24px;height:1px;background:var(--accent);flex-shrink:0;
    }
    .news-hero-title{
      font-family:var(--font-logo);
      font-size:clamp(3rem,7vw,6rem);
      color:var(--white);
      line-height:0.9;
      letter-spacing:-0.01em;
      margin-bottom:1.5rem;
    }
    .news-hero-desc{
      font-size:0.88rem;
      color:var(--text-muted);
      font-weight:300;
      max-width:480px;
      line-height:1.8;
    }

    /* ── MAIN LAYOUT ──────────────────────────────────────────── */
    .news-layout{
      max-width:1200px;
      margin:0 auto;
      padding:0 2.5rem 6rem;
    }

    /* ── FEATURED (first article, big hero card) ──────────────── */
    .news-featured{
      padding:3rem 0;
      border-bottom:1px solid var(--border);
    }
    .news-featured-label{
      font-size:0.52rem;letter-spacing:0.34em;text-transform:uppercase;
      color:var(--text-faint);font-weight:600;
      margin-bottom:1.5rem;
    }
    .news-featured-card{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:0;
      border:1px solid var(--border);
      background:var(--surface);
      overflow:hidden;
      transition:border-color 0.3s;
      position:relative;
    }
    .news-featured-card::before{
      content:'';
      position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,var(--accent),var(--accent-2),transparent);
      z-index:2;
    }
    .news-featured-card:hover{ border-color:var(--border-light); }
    .news-featured-thumb{
      overflow:hidden;
      aspect-ratio:4/3;
      background:var(--surface2);
      position:relative;
    }
    .news-featured-thumb img{
      width:100%;height:100%;
      object-fit:cover;
      display:block;
      transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .news-featured-card:hover .news-featured-thumb img{ transform:scale(1.05); }
    .news-featured-thumb--ph{
      display:flex;align-items:center;justify-content:center;
      width:100%;height:100%;aspect-ratio:4/3;
      background:var(--surface2);
    }
    .news-featured-thumb--ph svg{width:48px;height:48px;color:var(--text-faint);opacity:0.15}
    .news-featured-body{
      padding:2.5rem;
      display:flex;flex-direction:column;justify-content:center;
    }
    .news-featured-date{
      font-size:0.5rem;letter-spacing:0.28em;text-transform:uppercase;
      color:var(--text-faint);display:block;margin-bottom:1rem;
    }
    .news-featured-title{
      font-family:var(--font-logo);
      font-size:clamp(1.4rem,2.5vw,2rem);
      color:var(--white);line-height:1.2;
      margin-bottom:1rem;
    }
    .news-featured-desc{
      font-size:0.85rem;color:var(--text-muted);
      line-height:1.75;font-weight:300;
      margin-bottom:1.75rem;
      display:-webkit-box;-webkit-line-clamp:4;
      -webkit-box-orient:vertical;overflow:hidden;
    }
    .news-featured-cta{
      display:inline-flex;align-items:center;gap:0.5rem;
      font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;
      color:var(--accent);font-weight:600;
      transition:gap 0.2s;
    }
    .news-featured-card:hover .news-featured-cta{ gap:0.8rem; }
    .news-featured-cta-arrow{
      width:20px;height:1px;background:var(--accent);
      position:relative;transition:width 0.2s;
    }
    .news-featured-cta-arrow::after{
      content:'';position:absolute;right:0;top:-3px;
      width:6px;height:6px;border-top:1px solid var(--accent);
      border-right:1px solid var(--accent);transform:rotate(45deg);
    }
    .news-featured-card:hover .news-featured-cta-arrow{ width:28px; }

    /* ── GRID (remaining articles) ────────────────────────────── */
    .news-grid-section{
      padding-top:2.5rem;
    }
    .news-grid-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:1.75rem;
      padding-bottom:1rem;
      border-bottom:1px solid var(--border);
    }
    .news-grid-label{
      font-size:0.52rem;letter-spacing:0.34em;text-transform:uppercase;
      color:var(--text-faint);font-weight:600;
    }
    .news-count{
      font-size:0.5rem;letter-spacing:0.2em;text-transform:uppercase;
      color:var(--text-faint);
    }

    .news-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:1px;
      border:1px solid var(--border);
      background:var(--border);
    }
    .news-card{
      background:var(--surface);
      display:flex;flex-direction:column;
      overflow:hidden;
      position:relative;
      transition:background 0.25s;
    }
    .news-card:hover{ background:var(--surface2); }
    /* accent top bar on hover */
    .news-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:var(--accent);
      transform:scaleX(0);transform-origin:left;
      transition:transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
      z-index:2;
    }
    .news-card:hover::before{ transform:scaleX(1); }

    .news-card-thumb{
      width:100%;aspect-ratio:16/9;
      overflow:hidden;background:var(--surface2);
      flex-shrink:0;position:relative;
    }
    .news-card-thumb img{
      width:100%;height:100%;object-fit:cover;display:block;
      transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .news-card:hover .news-card-thumb img{ transform:scale(1.06); }
    /* subtle dark overlay on hover for image */
    .news-card-thumb::after{
      content:'';position:absolute;inset:0;
      background:rgba(14,12,11,0);
      transition:background 0.3s;
    }
    .news-card:hover .news-card-thumb::after{ background:rgba(14,12,11,0.15); }
    .news-card-thumb--ph{
      display:flex;align-items:center;justify-content:center;
      width:100%;aspect-ratio:16/9;background:var(--surface2);
    }
    .news-card-thumb--ph svg{width:28px;height:28px;color:var(--text-faint);opacity:0.15}

    .news-card-body{
      padding:1.25rem 1.5rem 1.5rem;
      flex:1;display:flex;flex-direction:column;
    }
    .news-card-date{
      font-size:0.48rem;letter-spacing:0.26em;text-transform:uppercase;
      color:var(--text-faint);display:block;margin-bottom:0.6rem;
    }
    .news-card-title{
      font-family:var(--font-logo);
      font-size:1rem;color:var(--white);
      line-height:1.3;margin-bottom:0.65rem;
      transition:color 0.2s;
    }
    .news-card:hover .news-card-title{ color:var(--white); }
    .news-card-desc{
      font-size:0.78rem;color:var(--text-muted);
      line-height:1.65;flex:1;margin-bottom:1rem;font-weight:300;
      display:-webkit-box;-webkit-line-clamp:3;
      -webkit-box-orient:vertical;overflow:hidden;
    }
    .news-card-foot{
      display:flex;align-items:center;justify-content:space-between;
      margin-top:auto;
      padding-top:0.85rem;
      border-top:1px solid var(--border);
    }
    .news-card-cta{
      font-size:0.52rem;letter-spacing:0.2em;text-transform:uppercase;
      color:var(--accent);font-weight:600;
      transition:letter-spacing 0.2s;
    }
    .news-card:hover .news-card-cta{ letter-spacing:0.26em; }
    .news-card-num{
      font-family:var(--font-logo);
      font-size:0.7rem;color:var(--text-faint);
      opacity:0.4;
    }

    /* ── EMPTY / ERROR / SKELETON ─────────────────────────────── */
    @keyframes fc-shimmer{0%,100%{opacity:0.35}50%{opacity:0.6}}
    .fc-empty,.fc-error{
      padding:4rem 2rem;text-align:center;
      font-size:0.8rem;letter-spacing:0.1em;
      color:var(--text-muted);
      border:1px dashed var(--border);
      grid-column:1/-1;
    }
    .fc-error{color:var(--accent)}

    /* skeleton states */
    .news-featured-skeleton{
      display:grid;grid-template-columns:1fr 1fr;
      border:1px solid var(--border);
      min-height:340px;
      background:var(--surface);
    }
    .news-featured-skeleton > div{
      background:var(--surface2);
      animation:fc-shimmer 1.4s ease-in-out infinite;
    }
    .news-featured-skeleton .sk-body{
      background:none;padding:2.5rem;
      display:flex;flex-direction:column;gap:1rem;
    }
    .sk-line{
      background:var(--surface2);
      border-radius:2px;
      animation:fc-shimmer 1.4s ease-in-out infinite;
    }
    .skeleton-card{
      background:var(--surface);
      border:none;min-height:260px;
      animation:fc-shimmer 1.4s ease-in-out infinite;
    }

    /* ── FOOTER ───────────────────────────────────────────────── */
    footer{
      border-top:1px solid var(--border);
      padding:2.5rem;
      max-width:1200px;margin:0 auto;
      display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:1rem;
    }
    .footer-copy{font-size:0.62rem;color:var(--text-faint)}
    .footer-back a{
      font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;
      color:var(--text-muted);transition:color 0.2s;
    }
    .footer-back a:hover{color:var(--accent)}

    /* ── RESPONSIVE ───────────────────────────────────────────── */
    @media(max-width:960px){
      .news-featured-card{ grid-template-columns:1fr; }
      .news-featured-thumb{ aspect-ratio:16/9; }
      .news-grid{ grid-template-columns:repeat(2,1fr); }
    }
    @media(max-width:640px){
      header{padding:0.85rem 1.25rem}
      nav{display:none}
      .nav-toggle{display:flex}
      .nav-drawer{display:flex}
      .news-hero,.news-layout{padding-left:1.25rem;padding-right:1.25rem}
      .news-hero-title{font-size:3rem}
      .news-grid{ grid-template-columns:1fr; }
      .news-featured-body{padding:1.5rem}
      footer{padding:2rem 1.25rem}
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="header-logo">
      <img src="../assets/logo.png" alt="Final Corners" width="32" height="32">
      <span class="header-logo-text">Final Corners</span>
    </a>
    <nav>
      <a href="/">Home</a>
      <a href="/#music">Music</a>
      <a href="/news/" class="active">News</a>
      <a href="/contact/">Contact</a>
    </nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </header>

  <nav class="nav-drawer" id="nav-drawer" aria-label="Mobile navigation">
    <a href="/" onclick="closeDrawer()">Home</a>
    <a href="/#music" onclick="closeDrawer()">Music</a>
    <a href="/news/" onclick="closeDrawer()">News</a>
    <a href="/contact/" onclick="closeDrawer()">Contact</a>
  </nav>

  <!-- ── Page Hero ── -->
  <div class="news-hero">
    <div class="news-hero-eyebrow">Final Corners · Updates</div>
    <h1 class="news-hero-title">News</h1>
    <p class="news-hero-desc">Berita dan pembaruan terbaru dari Final Corners — band indie rock asal Bandung.</p>
  </div>

  <main class="news-layout" id="news-main">

    <!-- Featured article slot -->
    <section class="news-featured" id="news-featured-section" aria-label="Artikel Utama">
      <div class="news-featured-label">Terbaru</div>
      <div id="news-featured">
        <!-- skeleton -->
        <div class="news-featured-skeleton" aria-hidden="true">
          <div></div>
          <div class="sk-body">
            <div class="sk-line" style="height:10px;width:60%"></div>
            <div class="sk-line" style="height:28px;width:90%"></div>
            <div class="sk-line" style="height:28px;width:75%"></div>
            <div class="sk-line" style="height:10px;width:100%;margin-top:0.5rem"></div>
            <div class="sk-line" style="height:10px;width:90%"></div>
            <div class="sk-line" style="height:10px;width:80%"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Grid section -->
    <section class="news-grid-section" aria-label="Semua Artikel">
      <div class="news-grid-header">
        <span class="news-grid-label">Semua Artikel</span>
        <span class="news-count" id="news-count"></span>
      </div>
      <div id="news-grid" class="news-grid" aria-live="polite">
        <!-- skeleton cards -->
        <div class="skeleton-card" aria-hidden="true"></div>
        <div class="skeleton-card" aria-hidden="true"></div>
        <div class="skeleton-card" aria-hidden="true"></div>
      </div>
    </section>

  </main>

  <footer>
    <p class="footer-copy">&copy; 2025–2026 Final Corners. Bandung, Indonesia.</p>
    <div class="footer-back"><a href="/">← Kembali ke Beranda</a></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/services.js"></script>
  <script src="../js/render.js"></script>
  <script src="../js/news.js"></script>

  <!-- ── Nav drawer toggle ── -->
  <script>
    const navToggle=document.getElementById('nav-toggle'),navDrawer=document.getElementById('nav-drawer');
    function closeDrawer(){navToggle.classList.remove('open');navToggle.setAttribute('aria-expanded','false');navDrawer.classList.remove('open');}
    if(navToggle){
      navToggle.addEventListener('click',function(){
        const o=navDrawer.classList.contains('open');
        if(o)closeDrawer();
        else{navToggle.classList.add('open');navToggle.setAttribute('aria-expanded','true');navDrawer.classList.add('open');}
      });
      document.addEventListener('click',e=>{
        if(!navToggle.contains(e.target)&&!navDrawer.contains(e.target))closeDrawer();
      });
    }
  </script>
</body>
</html>
